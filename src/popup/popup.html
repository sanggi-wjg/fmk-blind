<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FMK-Blind</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="fmkb-header">
    <h1 class="fmkb-title">FMK-Blind 차단 목록</h1>
    <span class="fmkb-count" id="fmkb-count" aria-live="polite">총 –명</span>
  </header>

  <div class="fmkb-search-wrap">
    <input
      type="search"
      id="fmkb-search"
      class="fmkb-search"
      placeholder="닉네임 또는 UID 검색"
      autocomplete="off"
      spellcheck="false"
      aria-label="차단 목록 검색"
    />
  </div>

  <p class="fmkb-notice" id="fmkb-notice">
    해제 후 <strong>이미 열린 페이지는 새로고침</strong>해야 반영됩니다.
  </p>

  <main class="fmkb-body">
    <!-- 차단 항목이 동적으로 채워짐: 각 항목 = 닉네임 + UID + 차단 해제 버튼 -->
    <ul class="fmkb-list" id="fmkb-list" aria-label="차단된 유저 목록"></ul>

    <!-- 빈 목록 / 검색 무결과 / 로드 오류 등 상태 메시지 -->
    <div class="fmkb-state" id="fmkb-state" role="status" hidden></div>
  </main>

  <!-- 내보내기/가져오기: 목록 백업·브라우저 간 이관(Chrome↔Firefox 목록 분리 해소 경로) -->
  <footer class="fmkb-footer">
    <div class="fmkb-io-actions">
      <button type="button" class="fmkb-io-btn" id="fmkb-export">내보내기</button>
      <button type="button" class="fmkb-io-btn" id="fmkb-import">가져오기</button>
      <!-- 숨김 파일 입력: 가져오기 버튼이 트리거. 같은 파일 재선택 위해 선택 후 value 초기화 -->
      <input
        type="file"
        id="fmkb-import-file"
        class="fmkb-import-file"
        accept=".json,application/json"
        hidden
      />
    </div>
    <!-- 내보내기/가져오기 결과·오류 안내(신뢰 불가 입력이므로 textContent로만 채움) -->
    <div class="fmkb-io-status" id="fmkb-io-status" role="status" aria-live="polite" hidden></div>
  </footer>

  <!-- 공유 저장 계층을 먼저 로드한 뒤 popup.js. -->
  <!-- 단일 출처: content script와 동일 파일(src/content/10-store.js)을 재사용(별도 사본 금지). -->
  <script src="../content/10-store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
